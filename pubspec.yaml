name: flutter_subscription_app
description: Bizoot subscription control app built with Flutter.
publish_to: "none"
version: 1.0.0+2

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  intl: ^0.20.2
  collection: ^1.19.1
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_messaging: ^15.2.7
  firebase_storage: ^12.4.10
  google_sign_in: ^7.2.0
  flutter_appauth: ^8.0.3
  http: ^1.5.0
  package_info_plus: ^9.0.1
  table_calendar: ^3.1.2
  url_launcher: ^6.3.1
  image_picker: ^1.2.2
  file_picker: ^10.3.2
  flutter_svg: ^2.2.1
  uuid: ^4.5.1
  purchases_flutter: ^9.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/data/subscription_services.json
    - assets/data/bizoot_top_100_provider_registry.json
    - assets/images/
    - assets/brand_icons/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/bizoot_app_icon.png"
  adaptive_icon_background: "#05031A"
  adaptive_icon_foreground: "assets/images/bizoot_app_icon.png"
  remove_alpha_ios: true
